<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ngày Này Năm Ấy</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <button id="toggle-music">🔊 Bật / Tắt Nhạc</button>
    <!-- video nen -->
    <video autoplay muted playsinside loop id="bg-video">
      <source src="./video3.mp4" type="video/mp4" />
    </video>

    <!-- nhac nen  -->
    <audio id="bg-music" autoplay loop>
      <source src="./music3.mp3" type="audio/mpeg" />
    </audio>

    <!-- noi dung chinh  -->
    <div class="content3">
      <h1>Lời Hứa Năm Ấy</h1>
      <h1>Thì Sao Hả Em...</h1>
    </div>

    <!-- chuyen trang  -->
    <button id="next-page">
      <i class="fa-solid fa-forward-step"></i>
    </button>

    <!-- trang truoc  -->
    <button id="prev-page">
      <i class="fa-solid fa-backward-step"></i>
    </button>
    <!-- javascript  -->
    <script src="script.js"></script>
  </body>
</html>
